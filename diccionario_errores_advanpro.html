<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diccionario de Errores — AdvanPRO</title>
<style>
:root {
  --bg: #F9F8F6;
  --card: #FFFFFF;
  --border: #E8E6DF;
  --border2: #D5D2C8;
  --text: #1A1917;
  --text2: #5F5E5A;
  --text3: #9A9890;
  --accent: #1D6A4E;
  --alta-bg: #E1F5EE; --alta-tx: #0A4A38;
  --media-bg: #FEF3E2; --media-tx: #7A3D08;
  --baja-bg: #F0EEE8; --baja-tx: #4A4944;
  --mod-bg: #EAF0FF; --mod-tx: #1A3A8A;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 24px 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.header h1 { font-size: 18px; font-weight: 600; color: var(--text); }
.header p { font-size: 13px; color: var(--text2); margin-top: 3px; }
.stats-row { display: flex; gap: 6px; flex-wrap: wrap; }
.stat { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; text-align: center; }
.stat-n { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1; }
.stat-l { font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }
.controls { padding: 14px 24px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
.search-wrap { position: relative; max-width: 600px; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
input[type=text] { width: 100%; padding: 9px 12px 9px 34px; font-size: 14px; border: 1px solid var(--border2); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; }
input[type=text]:focus { border-color: var(--accent); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
.pill { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border2); border-radius: 20px; cursor: pointer; background: var(--bg); color: var(--text2); transition: all .12s; white-space: nowrap; }
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.main { padding: 16px 24px; max-width: 1100px; }
.count-bar { font-size: 13px; color: var(--text3); margin-bottom: 12px; padding: 4px 0; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; box-shadow: var(--shadow); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.35; }
.badges { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 12px; font-weight: 500; white-space: nowrap; }
.alta { background: var(--alta-bg); color: var(--alta-tx); }
.media { background: var(--media-bg); color: var(--media-tx); }
.baja { background: var(--baja-bg); color: var(--baja-tx); }
.mod-badge { background: var(--mod-bg); color: var(--mod-tx); font-size: 10px; }
.grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media(max-width:700px) { .grid3 { grid-template-columns: 1fr; } }
.section label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); font-weight: 600; margin-bottom: 4px; }
.section p { font-size: 13px; color: var(--text2); line-height: 1.55; }
.kws { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
.kw { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg); color: var(--text3); border: 1px solid var(--border); }
.empty { text-align: center; padding: 48px 24px; color: var(--text3); font-size: 14px; }
.empty svg { margin: 0 auto 12px; display: block; opacity: .4; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <h1>Diccionario de Errores — AdvanPRO</h1>
      <p>Problemas recurrentes identificados en 13,116 tickets de soporte (2023–2026)</p>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Problemas</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--alta-tx)" id="sAlta">0</div><div class="stat-l">Alta</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--media-tx)" id="sMedia">0</div><div class="stat-l">Media</div></div>
      <div class="stat"><div class="stat-n" id="sMods">0</div><div class="stat-l">Módulos</div></div>
    </div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="q" placeholder="Buscar problema, síntoma, causa o palabra clave..." oninput="render()">
    </div>
    <div class="filter-row">
      <span class="filter-label">Módulo:</span>
      <div id="modPills"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Frecuencia:</span>
      <button class="pill on" onclick="setFreq('',this)">Todos</button>
      <button class="pill" onclick="setFreq('Alta',this)">Alta</button>
      <button class="pill" onclick="setFreq('Media',this)">Media</button>
      <button class="pill" onclick="setFreq('Baja',this)">Baja</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="count-bar" id="cnt"></div>
  <div id="list"></div>
</div>

<script>
const DATA = [{"m": "FACTURACIÓN", "f": "Alta", "t": "Factura atascada en estatus 'Enviado a Timbrar'", "s": "La factura no avanza del estatus 'enviado' o 'enviado a timbrar'; no cambia aunque se reintente desde el ERP.", "c": "Timeout o fallo de comunicación con el PAC (Finkok) durante el timbrado; el proceso queda en cola sin respuesta.", "sol": "Reprocesar el CFDI desde el panel de administración o hacer un cambio de estatus manual en BD.", "kw": ["enviado a timbrar", "estatus enviado", "CFDI", "PAC", "Finkok", "reproceso"]}, {"m": "FACTURACIÓN", "f": "Alta", "t": "Factura cancelada en SAT pero activa en AdvanPRO", "s": "El cliente cancela en el portal SAT con acuse de cancelación, pero en AdvanPRO la factura sigue como vigente o enviada.", "c": "Falta de sincronización entre el SAT y el ERP; el proceso de cancelación no actualizó el registro local.", "sol": "Soporte realiza cambio de estatus en BD para que refleje la cancelación; en facturas preimpresas se requiere marcarlas como incobrables primero.", "kw": ["cancelada SAT", "acuse", "sincronización", "estatus", "descuadre", "preimpresa"]}, {"m": "FACTURACIÓN", "f": "Alta", "t": "Factura pausada por validaciones de Carta Porte (CCP)", "s": "Al timbrar con complemento Carta Porte la factura se pausa con errores de RFC, tipos figura, mercancías peligrosas, código postal, PBV o clasificación arancelaria.", "c": "Datos incorrectos en la OS: RFC del operador o permisionario inválido, clasificación errónea de mercancía, forma de pago inconsistente, o configuración vehicular incompleta.", "sol": "Corregir RFC del operador/permisionario, clasificación de mercancía, forma de pago y datos vehiculares. Depurar la factura y regenerarla.", "kw": ["carta porte", "CCP", "pausada", "RFC", "mercancía peligrosa", "PBV", "CP129", "CP132", "CP149", "CP155"]}, {"m": "FACTURACIÓN", "f": "Alta", "t": "Modificación de estatus de facturas canceladas o rechazadas", "s": "Las facturas aparecen en estatus 'rechazada', 'cancelada en espera const MODS = ["ADMINISTRACIÓN DEL SISTEMA", "ADVANPRO TIMBRADO", "ALMACENES", "COMPRAS", "CONTABILIDAD ELECTRÓNICA WEB", "CONTABILIDAD GENERAL", "CONTENEDORES", "CONTROL BANCARIO", "CUENTAS POR COBRAR", "CUENTAS POR PAGAR", "DRIVE LOG", "FACTURACIÓN", "INTERFAZ CON RASTREO", "LIQUIDACIONES", "LLANTAS", "MADRINAS", "MANTENIMIENTO", "MÓDULO EDI", "TRÁFICO"];

let modFilter = '', freqFilter = '';

document.getElementById('sTotal').textContent = DATA.length;
document.getElementById('sAlta').textContent = DATA.filter(d=>d.f==='Alta').length;
document.getElementById('sMedia').textContent = DATA.filter(d=>d.f==='Media').length;
document.getElementById('sMods').textContent = MODS.length;

function initTabs() {
  const pc = document.getElementById('modPills');
  pc.innerHTML = '<button class="pill on" onclick="setMod(\'\',this)">Todos</button>' +
    MODS.map(m => {
      const cnt = DATA.filter(d=>d.m===m).length;
      return '<button class="pill" onclick="setMod(\''+m+'\',this)">'+m+' ('+cnt+')</button>';
    }).join('');
}

function setMod(v, el) {
  modFilter = v;
  document.querySelectorAll('#modPills .pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  render();
}

function setFreq(v, el) {
  freqFilter = v;
  document.querySelectorAll('.filter-row:last-child .pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  render();
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:#FFF3B0;border-radius:2px">$1</mark>');
}

function render() {
  const q = (document.getElementById('q').value || '').toLowerCase().trim();
  let rows = DATA.filter(d => {
    if (modFilter && d.m !== modFilter) return false;
    if (freqFilter && d.f !== freqFilter) return false;
    if (q) {
      const haystack = [d.t, d.s, d.c, d.sol, ...(d.kw||[])].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('cnt').textContent = rows.length + ' problema' + (rows.length!==1?'s':'') + ' encontrado' + (rows.length!==1?'s':'');

  const el = document.getElementById('list');
  if (!rows.length) {
    el.innerHTML = '<div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Sin resultados. Intenta con otro término o módulo.</div>';
    return;
  }

  el.innerHTML = rows.map(d => {
    const fc = d.f==='Alta'?'alta':d.f==='Media'?'media':'baja';
    const kws = (d.kw||[]).map(k=>'<span class="kw">'+k+'</span>').join('');
    const hl = txt => highlight(txt, q);
    return '<div class="card">' +
      '<div class="card-top">' +
        '<span class="card-title">'+hl(d.t)+'</span>' +
        '<div class="badges"><span class="badge '+fc+'">'+d.f+'</span><span class="badge mod-badge">'+d.m+'</span></div>' +
      '</div>' +
      '<div class="grid3">' +
        '<div class="section"><label>Síntomas</label><p>'+hl(d.s)+'</p></div>' +
        '<div class="section"><label>Causa típica</label><p>'+hl(d.c)+'</p></div>' +
        '<div class="section"><label>Solución típica</label><p>'+hl(d.sol)+'</p></div>' +
      '</div>' +
      (kws ? '<div class="kws">'+kws+'</div>' : '') +
    '</div>';
  }).join('');
}

initTabs();
render();
</script>
